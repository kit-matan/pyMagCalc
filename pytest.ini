[pytest]
# Default run = the FAST suite (~4 min): every feature keeps at least one quick
# pinned test. The `slow` marker holds the deep/expensive validations (ED oracles,
# convergence sweeps, long integration runs, ~8 s+ each).
#
#   pytest              -> fast suite (default, for iteration)
#   pytest -m slow      -> only the deep validations
#   pytest -m ""        -> EVERYTHING -- required before merging to master
addopts = -m "not slow"
markers =
    slow: deep/expensive validation; excluded from the default run (see pytest.ini)
