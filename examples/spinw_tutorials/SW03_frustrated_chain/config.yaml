# =====================================================================
# SW03 - Frustrated J1-J2 chain (incommensurate spiral)
#
# Port of SpinW Tutorial 3 / Sunny "SW03" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/03tutorial
#
#   magcalc run examples/spinw_tutorials/SW03_frustrated_chain/config.yaml
#
# Competing NN FM J1 = -1 and 2nd-NN AFM J2 = +2 give an INCOMMENSURATE
# spiral ground state with pitch cos(2*pi*k) = -J1/(4 J2) = 1/8, i.e.
# k = 0.230053... (as in the tutorial). pyMagCalc has no single-k spiral
# LSWT that reproduces the full three-branch spiral spectrum (its
# rotating-frame 'spiral' option gaps the phason and gives only one
# branch). Instead this port uses the standard, exact method: a COMMENSURATE
# SUPERCELL that approximates k. k = 3/13 = 0.23077 (closest small fraction
# to 0.230053) -> a 13-site chain, with the spiral supplied as 13 in-plane
# directions at angles 2*pi*(3/13)*i.
#
# The dispersion is the correct spiral spectrum FOLDED into 13 bands. Most
# are zero-intensity 'ghost' modes (the same artifact Sunny notes for its
# own supercell method in SW08); the physical envelope has the gapless
# phason at q=0 and Goldstones at +/-k. Because 3/13 is not exactly the
# minimizing pitch, a tiny (~0.03 meV) imaginary part appears at a few q.
# For a clean single-branch plot, compute S(Q,w) (ghosts carry no weight).
# =====================================================================
# on_imaginary: warn -- this is the COMMENSURATE 13-site approximation to an
# incommensurate spiral (k = 0.23006, vs 3/13 = 0.23077). The imposed spiral is
# therefore not exactly the minimum of the 13-site cell and LSWT shows small
# imaginary parts (~3e-2 meV). Use config_spiral.yaml (rotating frame) for the
# exact treatment -- it is stable and validated to ~1e-12 against the analytic helix.
parameter_order: [J1, J2]
parameters:
  J1: -1.0
  J2: 2.0
