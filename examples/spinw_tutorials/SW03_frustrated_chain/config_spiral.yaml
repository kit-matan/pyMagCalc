# =====================================================================
# SW03 - Frustrated J1-J2 chain: EXACT incommensurate spiral (rotating frame)
#
#   magcalc run examples/spinw_tutorials/SW03_frustrated_chain/config_spiral.yaml
#
# Companion to config.yaml (commensurate 13-site supercell). This variant
# uses pyMagCalc's single-k rotating-frame spiral mode at the EXACT
# incommensurate pitch k = arccos(1/8)/2pi = 0.2300534561: interactions are
# rotated by R(2 pi k.r) about 'axis' and the LSWT runs on the 1-site cell.
# Validated against the analytic helix dispersion
#   w(q) = 2S sqrt( [A(q)-A(k)] [ (A(q+k)+A(q-k))/2 - A(k) ] ),
#   A(q) = J1 cos(2 pi q) + J2 cos(4 pi q)
# to ~1e-12 at all q (gapless phason at q=0 and Goldstones at q=+-k).
# This plot shows the CENTRAL branch w(q); the SpinW/Sunny figure overlays
# the three branches w(q), w(q+k), w(q-k) - shift the path by +-k to get
# the other two.
#
# NOTE: the J2 distance rule needs the +-2 cell image; the rule expansion
# auto-sizes its search range from the target distance (engine fix).
# =====================================================================
parameter_order: [J1, J2]
parameters: {J1: -1.0, J2: 2.0}
crystal_structure:
  lattice_vectors:
  - [3.0, 0.0, 0.0]
  - [0.0, 8.0, 0.0]
  - [0.0, 0.0, 8.0]
  atoms_uc:
  - label: A
    pos: [0.0, 0.0, 0.0]
    spin_S: 1.0
    ion: Cu2+
interactions:
  symmetry_rules:
  - {type: heisenberg, distance: 3.0, value: J1}   # NN along the chain (a)
  - {type: heisenberg, distance: 6.0, value: J2}   # 2nd NN along the chain (2a)
magnetic_structure:
  enabled: true
  type: spiral
  k: [0.23005345616261588, 0.0, 0.0]
  axis: [0.0, 0.0, 1.0]
tasks: {minimization: false, dispersion: true}
q_path:
  G: [0.0, 0.0, 0.0]
  H: [1.0, 0.0, 0.0]
  path: [G, H]
  points_per_segment: 400
plotting:
  save_plot: true
  show_plot: false
  plot_structure: false
  energy_limits_disp: [0, 5]
  disp_plot_filename: SW03_spiral_disp.png
  disp_title: 'SW03 spiral (rotating frame, exact k=0.230053): central branch'
calculation: {cache_mode: none}
output: {save_data: false}
