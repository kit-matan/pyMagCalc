# =====================================================================
# SW16 - Na2IrO3 honeycomb: Kitaev-Heisenberg model, zig-zag order
#
# Port of SpinW Tutorial 16 to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/16tutorial   (Choi et al., PRL 108, 127204)
#
#   magcalc run examples/spinw_tutorials/SW16_Na2IrO3_Kitaev/config.yaml
#
# Monoclinic C2/m honeycomb of Ir4+ (effective S=1/2), 4 Ir per cell.
# Each nearest-neighbour bond carries Heisenberg J1 PLUS a BOND-DEPENDENT
# Kitaev term (crystal-Cartesian axes): the z-bond (along b, 3.138 A) gets
# -JK*Sz^2, and the two x/y bonds (3.130 A) get -JK*Sx^2 and -JK*Sy^2.
# Further-neighbour Heisenberg J2 (2nd NN, ~5.43 A) and J3 (3rd NN, across
# the hexagon, ~6.26 A) complete the model. Parameters are the Fig. S3(i-j)
# 'zig-zag' set: J1=1, J2=0.23, J3=0.51, JK=1.33 meV.
#
# The Kitaev matrices are entered as full 3x3 interaction_matrix bonds
# (SpinW's Jfun): NN = diag(J1,J1,J1) + one -JK on the bond's Kitaev axis.
# The x/y bonds are distinguished by orientation (sign of v_x*v_y).
#
# VALIDATION against the tutorial's stated numbers:
#   * Fig S3(d) stripy (J2=J3=0, JK=1.33): this model gives E/site=-0.29125,
#     matching the tutorial's -0.2913, with spins along c -- exactly as stated.
#   * Fig S3(i-j): the zig-zag order (spins || b) is the global energy
#     minimum (E/site=-0.290), supplied below. The a- and b-oriented
#     zig-zag domains are exactly degenerate here; the tutorial picks b.
#
# Q-path is the tutorial's: [-1,0,0]->[0,0,0]->[0,1,0]->[1,1,0]->
# [1/2,1/2,0]->[0,0,0]. Bonds/sites generated by a helper script (see README).
# =====================================================================
