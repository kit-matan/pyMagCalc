# =====================================================================
# SW20 -- Yb2Ti2O7 in an applied field (SpinW tutorial 20, in-field panels).
#
# The tutorial's in-field spectra need an ANISOTROPIC g-tensor that is
# uniaxial about each site's OWN local <111> axis (Ross et al., PRX 1,
# 021002) -- something a single global isotropic Zeeman cannot express:
#
#     g_par (|| local <111>) = 1.8      g_perp = 4.32
#
# Each Yb site therefore carries `g: {g_par, g_perp, axis}`. The four local
# axes were derived geometrically from the structure (site -> centre of its
# tetrahedron); the 16d sites fall into four groups of four:
#     Yb0-3   [ 1, 1, 1]      Yb8-11  [ 1,-1, 1]
#     Yb4-7   [ 1,-1,-1]      Yb12-15 [ 1, 1,-1]
# Only the axis DIRECTION matters (g enters as g_par*zz^T + g_perp*(1-zz^T)).
#
# Field: B = 5 T along [1 -1 0]. H_mag is in Tesla; with an explicit
# g-tensor the Zeeman is mu_B * B . g_i . S_i, which reduces exactly to the
# legacy calibrated term at g = 2 (tests/test_hamiltonian_terms.py).
#
# GROUND STATE -- read this before changing `minimization`.
# This is a frustrated pyrochlore: 16 sites = 32 angles, and the energy
# landscape has local minima that are NOT the ground state but still look
# plausible. With too few starts the minimizer settles in one of them and
# LSWT is then built about a non-minimum, which shows up as IMAGINARY magnon
# energies at every q. `num_starts: 200` + `early_stopping: 40` reaches the
# true minimum, E = -5.716074 meV/cell -- reproducible from seeds 0/1/7/123,
# with zero imaginary modes. (num_starts 24 / early_stopping 10 gave
# -5.338 meV and imaginary modes everywhere.) If you retune this model,
# check the energy is reproducible across seeds AND that no imaginary-part
# warnings appear -- either one alone is not sufficient.
#
# Result: a fully gapped spectrum (no Goldstone -- the field breaks every
# continuous symmetry), gap 0.413 meV, bands to 1.109 meV. Field dependence
# is monotonic in energy (0/2/5 T -> -2.220 / -3.430 / -5.716 meV) with the
# gap softening near 2 T as the splayed FM reorients toward the field.
#
# The zero-field model lives in config.yaml (identical exchange; the
# g-tensor is inert at B = 0 since it only enters the Zeeman).
# =====================================================================
