# =====================================================================
# SW14 - YVO3
#
# Port of SpinW Tutorial 14 / Sunny "SW14" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/14tutorial
#
#   magcalc run examples/spinw_tutorials/SW14_YVO3/config.yaml
#
# Model of C. Ulrich et al., PRL 91, 257202 (2003). The exchange breaks the
# nominal Pnma symmetry, so Sunny uses spacegroup P1 (all bonds explicit);
# this port does the same on a 2x2x1 magnetic supercell (8 V4+, S=1/2).
# :dipole_uncorrected in Sunny == no renormalization in pyMagCalc.
#
# In-plane Jab = 2.6 (AFM) gives Neel order in the ab plane; the c-axis
# bonds are the two ALTERNATING anisotropic 3x3 matrices Jc1, Jc2 (FM-like
# diagonal -Jc(1+/-delta), a K2 term on the xx component, and an
# antisymmetric DM part +/- d in the xz block). The reverse of every matrix
# bond carries its transpose. A single-ion term -K1*Sx^2 is added on each V.
#
# Energy minimization gives the canted C-type antiferromagnet (AFM along a,
# FM along c, spins ~along c with a +/-0.24 x-canting from the DM); that
# structure is supplied below (minimized, then fixed). q-path is Sunny's
# [3/4,3/4,0]->[1/2,1/2,0]->[1/2,1/2,1], scaled x2 in a,b for the supercell.
# The bonds/sites were emitted by a helper script (see README).
# =====================================================================
parameter_order: [Jab]
parameters: {Jab: 2.6}
