magnetic_structure:
  enabled: true
  type: pattern
  pattern_type: generic
  directions:
  - [0, 0, -1.0]
  - [0, 0, 1.0]
  - [0, 0, 1.0]
  - [0, 0, -1.0]
tasks: {minimization: false, dispersion: true}
q_path:
  X1: [2, 1, 0]
  A: [0, 1, 0]
  X2: [0, 1, 2]
  path: [X1, A, X2]
  points_per_segment: 200
plotting:
  save_plot: true
  show_plot: false
  plot_structure: false
  energy_limits_disp: [0, 10]
  disp_plot_filename: SW13_disp.png
  disp_title: 'SW13 LiNiPO4: [xi,1,0] | [0,1,xi]'
calculation: {cache_mode: none}
output: {save_data: false}
