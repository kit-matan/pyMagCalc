# =====================================================================
# SW13 - LiNiPO4
#
# Port of SpinW Tutorial 13 / Sunny "SW13" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/13tutorial
#
#   magcalc run examples/spinw_tutorials/SW13_LiNiPO4/config.yaml
#
# Orthorhombic Pnma (SG 62), Ni2+ (S=1) on the 4c Wyckoff site. Exchange
# and anisotropy from T. Jensen et al., PRB 79, 092413 (2009) (anisotropy
# = the corrected thesis values). Sunny uses :dipole_uncorrected (no
# classical-to-quantum rescaling); pyMagCalc does not renormalize either,
# so the anisotropies are used as-is.
#
# The four SG-62 Ni sites and every symmetry-equivalent bond are listed
# explicitly (generated by a helper script). Each Ni-Ni bond is assigned
# to an exchange by its crystallographic character / length:
#   Jbc (3.75 A, bc-diagonal NN, dominant), Jc (4.68 A = c),
#   Jac (5.53 A, ac-diagonal), Jab (5.80 A, ab-diagonal), Jb (5.86 A = b).
# Two-axis single-ion anisotropy Da*Sx^2 + Db*Sy^2 (Da,Db>0) makes c the
# easy axis. The ground state is the collinear Cz antiferromagnet along c
# (Ni: -,+,+,- ), supplied directly below (energy-minimized, then fixed).
#
# Result: a ~2 meV spin gap and ~7 meV bandwidth, matching the LiNiPO4
# magnon spectrum. Path combines the tutorial's [xi,1,0] and [0,1,xi].
# =====================================================================
parameter_order: [Jbc, Jb, Jc, Jab, Jac]
parameters: {Jbc: 1.036, Jb: 0.6701, Jc: -0.0469, Jab: 0.2977, Jac: -0.1121}
crystal_structure:
  lattice_vectors:
  - [10.02, 0, 0]
  - [0, 5.86, 0]
  - [0, 0, 4.68]
  atoms_uc:
  - label: Ni0
    pos: [0.25, 0.25, 0.0]
    spin_S: 1.0
    ion: Ni2+
  - label: Ni1
    pos: [0.25, 0.75, 0.5]
    spin_S: 1.0
    ion: Ni2+
  - label: Ni2
    pos: [0.75, 0.75, 0.0]
    spin_S: 1.0
    ion: Ni2+
  - label: Ni3
    pos: [0.75, 0.25, 0.5]
    spin_S: 1.0
    ion: Ni2+
interactions:
  single_ion_anisotropy:
  - value: 0.1969
    axis: [1, 0, 0]
    atoms: &id001 [Ni0, Ni1, Ni2, Ni3]
  - value: 0.9097
    axis: [0, 1, 0]
    atoms: *id001
  heisenberg:
  - type: heisenberg
    pair: [Ni0, Ni2]
    rij_offset: [-1, -1, 0]
    value: Jab
  - type: heisenberg
    pair: [Ni0, Ni3]
    rij_offset: [-1, 0, -1]
    value: Jac
  - type: heisenberg
    pair: [Ni0, Ni2]
    rij_offset: [-1, 0, 0]
    value: Jab
  - type: heisenberg
    pair: [Ni0, Ni3]
    rij_offset: [-1, 0, 0]
    value: Jac
  - type: heisenberg
    pair: [Ni0, Ni1]
    rij_offset: [0, -1, -1]
    value: Jbc
  - type: heisenberg
    pair: [Ni0, Ni0]
    rij_offset: [0, -1, 0]
