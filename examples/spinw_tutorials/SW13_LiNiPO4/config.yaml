# =====================================================================
# SW13 - LiNiPO4
#
# Port of SpinW Tutorial 13 / Sunny "SW13" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/13tutorial
#
#   magcalc run examples/spinw_tutorials/SW13_LiNiPO4/config.yaml
#
# Orthorhombic Pnma (SG 62), Ni2+ (S=1) on the 4c Wyckoff site. Exchange
# and anisotropy from T. Jensen et al., PRB 79, 092413 (2009) (anisotropy
# = the corrected thesis values). Sunny uses :dipole_uncorrected (no
# classical-to-quantum rescaling); pyMagCalc does not renormalize either,
# so the anisotropies are used as-is.
#
# The four SG-62 Ni sites are the Pnma 4c Wyckoff orbit of (1/4,1/4,0);
# every bond enters as a distance symmetry rule (the five exchanges live
# on five distinct bond lengths):
#   Jbc (3.75 A, bc-diagonal NN, dominant), Jc (4.68 A = c),
#   Jac (5.53 A, ac-diagonal), Jab (5.80 A, ab-diagonal), Jb (5.86 A = b).
# Two-axis single-ion anisotropy Da*Sx^2 + Db*Sy^2 (Da,Db>0) makes c the
# easy axis. The ground state is the collinear Cz antiferromagnet along c
# (Ni: -,+,+,- ), supplied directly below (energy-minimized, then fixed).
#
# Result: a ~2 meV spin gap and ~7 meV bandwidth, matching the LiNiPO4
# magnon spectrum. Path combines the tutorial's [xi,1,0] and [0,1,xi].
# =====================================================================
parameter_order: [Jbc, Jb, Jc, Jab, Jac]
parameters: {Jbc: 1.036, Jb: 0.6701, Jc: -0.0469, Jab: 0.2977, Jac: -0.1121}
crystal_structure:
  lattice_parameters: {a: 10.02, b: 5.86, c: 4.68, alpha: 90.0, beta: 90.0, gamma: 90.0,
                       space_group: 62}
  wyckoff_atoms:
  - {label: Ni, pos: [0.25, 0.25, 0.0], spin_S: 1.0, ion: Ni2+}   # Pnma 4c orbit -> Ni0..Ni3
interactions:
  single_ion_anisotropy:
  - value: 0.1969
    axis: [1, 0, 0]
    atoms: &id001 [Ni0, Ni1, Ni2, Ni3]
  - value: 0.9097
    axis: [0, 1, 0]
    atoms: *id001
  symmetry_rules:
  - {type: heisenberg, distance: 3.74970, value: Jbc}   # bc-diagonal NN (dominant)
  - {type: heisenberg, distance: 4.68000, value: Jc}    # along c
  - {type: heisenberg, distance: 5.52950, value: Jac}   # ac-diagonal
  - {type: heisenberg, distance: 5.80390, value: Jab}   # ab-diagonal
  - {type: heisenberg, distance: 5.86000, value: Jb}    # along b
magnetic_structure:
  enabled: true
  type: pattern
  pattern_type: generic
  directions:
  - [0, 0, -1.0]
  - [0, 0, 1.0]
  - [0, 0, 1.0]
  - [0, 0, -1.0]
tasks: {minimization: false, dispersion: true}
q_path:
  X1: [2, 1, 0]
  A: [0, 1, 0]
  X2: [0, 1, 2]
  path: [X1, A, X2]
  points_per_segment: 200
plotting:
  save_plot: true
  show_plot: false
  plot_structure: false
  energy_limits_disp: [0, 10]
  disp_plot_filename: SW13_disp.png
  disp_title: 'SW13 LiNiPO4: [xi,1,0] | [0,1,xi]'
calculation: {cache_mode: none}
output: {save_data: false}
