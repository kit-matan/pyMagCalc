# =====================================================================
# SW12 - Triangular lattice with easy-plane anisotropy
#
# Port of SpinW Tutorial 12 / Sunny "SW12" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/12tutorial
#
#   magcalc run examples/spinw_tutorials/SW12_triangular_easyplane/config.yaml
#
# Triangular lattice (a=b=3, gamma=120), S=3/2, NN AFM J1 = +1 meV plus an
# easy-plane single-ion anisotropy +D Sz^2 (spins prefer the xy plane).
# The 120-degree order is commensurate with a 3x3 magnetic cell, built
# explicitly here (a=b = 3x3 = 9 A) with the nine sites carrying the
# 120*(i+j) deg pattern in the xy plane.
#
# Anisotropy value: SpinW uses D = 0.2 with no classical-to-quantum
# renormalization. Sunny reproduces this by feeding D = 0.2/(1-1/2s) = 0.3
# into its :dipole mode (which renormalizes by (1-1/2s)). pyMagCalc does
# NOT renormalize, so the physical value D = 0.2 is used directly.
#
# Result matches SpinW/Sunny: the easy-plane anisotropy leaves ONE gapless
# in-plane Goldstone (uniform rotation about z) at Gamma and at the 120-deg
# ordering point, and gaps the two out-of-plane modes by ~sqrt(D). (Two
# pyMagCalc bugs had to be fixed for this: single-ion-anisotropy literal
# values were being ignored, and the on-site anomalous c^2/c-dagger^2 terms
# were dropped when assembling the dynamical matrix, which spuriously
# gapped the Goldstone. Both are fixed; pure-exchange results are
# byte-identical.)
#
# This file was generated by a helper script (see README).
# =====================================================================
parameter_order: [J1]
parameters: {J1: 1.0}
crystal_structure:
  lattice_vectors:
  - [9.0, 0.0, 0.0]
  - [-4.5, 7.794229, 0.0]
  - [0.0, 0.0, 4.0]
  atoms_uc:
  - label: V00
    pos: [0.0, 0.0, 0.0]
    spin_S: 1.5
    ion: V4+
  - label: V10
    pos: [0.333333, 0.0, 0.0]
    spin_S: 1.5
    ion: V4+
  - label: V20
    pos: [0.666667, 0.0, 0.0]
    spin_S: 1.5
    ion: V4+
  - label: V01
    pos: [0.0, 0.333333, 0.0]
    spin_S: 1.5
    ion: V4+
  - label: V11
    pos: [0.333333, 0.333333, 0.0]
    spin_S: 1.5
    ion: V4+
  - label: V21
    pos: [0.666667, 0.333333, 0.0]
    spin_S: 1.5
    ion: V4+
  - label: V02
    pos: [0.0, 0.666667, 0.0]
    spin_S: 1.5
    ion: V4+
  - label: V12
    pos: [0.333333, 0.666667, 0.0]
    spin_S: 1.5
    ion: V4+
  - label: V22
    pos: [0.666667, 0.666667, 0.0]
    spin_S: 1.5
    ion: V4+
interactions:
  single_ion_anisotropy:
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V00]
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V10]
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V20]
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V01]
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V11]
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V21]
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V02]
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V12]
  - value: 0.2
    axis: [0, 0, 1]
    atoms: [V22]
  symmetry_rules:
  - {type: heisenberg, distance: 3.0, value: J1}
magnetic_structure:
  enabled: true
  type: pattern
  pattern_type: generic
  directions:
  - [1.0, 0.0, 0.0]
  - [-0.5, 0.866025, 0.0]
  - [-0.5, -0.866025, 0.0]
  - [-0.5, 0.866025, 0.0]
  - [-0.5, -0.866025, 0.0]
  - [1.0, 0.0, 0.0]
  - [-0.5, -0.866025, 0.0]
  - [1.0, 0.0, 0.0]
  - [-0.5, 0.866025, 0.0]
tasks: {minimization: false, dispersion: true}
q_path:
  Gamma: [0.0, 0.0, 0.0]
  H110: [3.0, 3.0, 0.0]
  path: [Gamma, H110]
  points_per_segment: 400
plotting: {save_plot: true, show_plot: false, plot_structure: false, disp_plot_filename: SW12_disp.png,
  disp_title: 'SW12 Triangular lattice, easy-plane anisotropy: dispersion'}
calculation: {cache_mode: none}
output: {save_data: false}
