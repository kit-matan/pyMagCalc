# =====================================================================
# SW06 - Complex kagome ferromagnet
#
# Port of SpinW Tutorial 6 / Sunny "SW06" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/06tutorial
#
#   magcalc run examples/spinw_tutorials/SW06_kagome_FM_complex/config.yaml
#
# Kagome lattice, k=0 ferromagnet (S=1). Strong NN FM J1 = -1, plus
# J2 = 0.1 (2nd NN) and J3b = 0.17 (3rd NN through the empty hexagon).
# At 6 A there are TWO symmetry-inequivalent 3rd-NN bonds: J3a (over an
# atom, = 0 here) and J3b (through the hexagon). A plain distance rule
# cannot separate them, so J3b is given as a ref_pair rule (one reference
# through-hexagon bond, propagated by the detected symmetry, which keeps
# the two families apart). J1/J2 are unambiguous by distance.
# =====================================================================
parameter_order: [J1, J2, J3b]
parameters:
  J1: -1.0
  J2: 0.1
  J3b: 0.17
crystal_structure:
  lattice_parameters:
    a: 6.0
    b: 6.0
    c: 8.0
    alpha: 90.0
    beta: 90.0
    gamma: 120.0
    space_group: 147
  wyckoff_atoms:
  - label: K
    pos: [0.5, 0.0, 0.0]
    spin_S: 1.0
    ion: Cu2+
interactions:
  symmetry_rules:
  - type: heisenberg
    distance: 3.0
    value: J1
  - type: heisenberg
    distance: 5.196152
    value: J2
  - type: heisenberg
    ref_pair: [K0, K0]
    offset: [-1, 0, 0]
    value: J3b
magnetic_structure:
  enabled: true
  type: pattern
  pattern_type: ferromagnetic
  direction: [0.0, 0.0, 1.0]
tasks:
  minimization: false
  dispersion: true
q_path:
  mM: [-0.5, 0.0, 0.0]
  Gamma: [0.0, 0.0, 0.0]
  K: [0.5, 0.5, 0.0]
  path: [mM, Gamma, K]
  points_per_segment: 200
plotting:
  save_plot: true
  show_plot: false
  plot_structure: false
  disp_plot_filename: SW06_disp.png
  disp_title: 'SW06 Complex kagome ferromagnet: dispersion'
calculation:
  cache_mode: none
output:
  save_data: false
