# =====================================================================
# SW06 - Complex kagome ferromagnet
#
# Port of SpinW Tutorial 6 / Sunny "SW06" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/06tutorial
#
#   magcalc run examples/spinw_tutorials/SW06_kagome_FM_complex/config.yaml
#
# Kagome lattice, k=0 ferromagnet (S=1). Strong NN FM J1 = -1, plus
# J2 = 0.1 (2nd NN) and J3b = 0.17 (3rd NN through the empty hexagon).
# At 6 A there are TWO symmetry-inequivalent 3rd-NN bonds: J3a (over an
# atom, = 0 here) and J3b (through the hexagon). A plain distance rule
# cannot separate them, so the bonds are listed explicitly: each 6 A
# same-sublattice bond is classified by whether its midpoint lands on an
# atom (J3a) or a hexagon centre (J3b), keeping only J3b. J1/J2 are
# unambiguous by distance.
#
# This file was generated by a helper script (see README).
# =====================================================================
parameter_order: [J1, J2, J3b]
parameters: {J1: -1.0, J2: 0.1, J3b: 0.17}
crystal_structure:
  lattice_vectors:
  - [6.0, 0.0, 0.0]
  - [-3.0, 5.196152, 0.0]
  - [0.0, 0.0, 8.0]
  atoms_uc:
  - label: K1
    pos: [0.5, 0.0, 0.0]
    spin_S: 1.0
    ion: Cu2+
  - label: K2
    pos: [0.0, 0.5, 0.0]
    spin_S: 1.0
    ion: Cu2+
  - label: K3
    pos: [0.5, 0.5, 0.0]
    spin_S: 1.0
    ion: Cu2+
interactions:
- type: heisenberg
  pair: [K1, K3]
  rij_offset: [-1, -1, 0]
  value: J2
- type: heisenberg
  pair: [K1, K1]
  rij_offset: [-1, 0, 0]
  value: J3b
- type: heisenberg
  pair: [K1, K2]
  rij_offset: [0, -1, 0]
  value: J1
- type: heisenberg
  pair: [K1, K3]
  rij_offset: [0, -1, 0]
  value: J1
- type: heisenberg
  pair: [K1, K2]
  rij_offset: [0, 0, 0]
  value: J2
- type: heisenberg
  pair: [K1, K3]
  rij_offset: [0, 0, 0]
  value: J1
- type: heisenberg
  pair: [K1, K2]
  rij_offset: [1, -1, 0]
  value: J2
- type: heisenberg
  pair: [K1, K1]
  rij_offset: [1, 0, 0]
  value: J3b
- type: heisenberg
  pair: [K1, K2]
  rij_offset: [1, 0, 0]
  value: J1
- type: heisenberg
  pair: [K1, K3]
  rij_offset: [1, 0, 0]
  value: J2
- type: heisenberg
  pair: [K2, K3]
  rij_offset: [-1, -1, 0]
  value: J2
- type: heisenberg
  pair: [K2, K1]
  rij_offset: [-1, 0, 0]
  value: J1
- type: heisenberg
  pair: [K2, K3]
  rij_offset: [-1, 0, 0]
  value: J1
- type: heisenberg
  pair: [K2, K1]
  rij_offset: [-1, 1, 0]
  value: J2
- type: heisenberg
  pair: [K2, K2]
  rij_offset: [0, -1, 0]
  value: J3b
- type: heisenberg
  pair: [K2, K1]
  rij_offset: [0, 0, 0]
  value: J2
- type: heisenberg
  pair: [K2, K3]
  rij_offset: [0, 0, 0]
  value: J1
- type: heisenberg
  pair: [K2, K1]
  rij_offset: [0, 1, 0]
  value: J1
- type: heisenberg
  pair: [K2, K2]
  rij_offset: [0, 1, 0]
  value: J3b
- type: heisenberg
  pair: [K2, K3]
  rij_offset: [0, 1, 0]
  value: J2
- type: heisenberg
  pair: [K3, K3]
  rij_offset: [-1, -1, 0]
  value: J3b
- type: heisenberg
  pair: [K3, K1]
  rij_offset: [-1, 0, 0]
  value: J2
- type: heisenberg
  pair: [K3, K2]
  rij_offset: [0, -1, 0]
  value: J2
- type: heisenberg
  pair: [K3, K1]
  rij_offset: [0, 0, 0]
  value: J1
- type: heisenberg
  pair: [K3, K2]
  rij_offset: [0, 0, 0]
  value: J1
- type: heisenberg
  pair: [K3, K1]
  rij_offset: [0, 1, 0]
  value: J1
- type: heisenberg
  pair: [K3, K2]
  rij_offset: [1, 0, 0]
  value: J1
- type: heisenberg
  pair: [K3, K1]
  rij_offset: [1, 1, 0]
  value: J2
- type: heisenberg
  pair: [K3, K2]
  rij_offset: [1, 1, 0]
  value: J2
- type: heisenberg
  pair: [K3, K3]
  rij_offset: [1, 1, 0]
  value: J3b
magnetic_structure:
  enabled: true
  type: pattern
  pattern_type: ferromagnetic
  direction: [0.0, 0.0, 1.0]
tasks: {minimization: false, dispersion: true}
q_path:
  mM: [-0.5, 0.0, 0.0]
  Gamma: [0.0, 0.0, 0.0]
  K: [0.5, 0.5, 0.0]
  path: [mM, Gamma, K]
  points_per_segment: 200
plotting: {save_plot: true, show_plot: false, plot_structure: false, disp_plot_filename: SW06_disp.png,
  disp_title: 'SW06 Complex kagome ferromagnet: dispersion'}
calculation: {cache_mode: none}
output: {save_data: false}
