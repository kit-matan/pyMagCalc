# =====================================================================
# SW18 - Distorted kagome KCu3As2O7(OD)3: incommensurate helix
#
# Port of SpinW Tutorial 18 / Sunny "SW18" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/18tutorial
#
#   magcalc run examples/spinw_tutorials/SW18_distorted_kagome/config.yaml
#
# Monoclinic C2/m (SG 12), 6 Cu (2 Cu1 + 4 Cu2), S=1/2. Model of Toth &
# Lake (2015). Exchanges: J=-2 (Cu1-Cu2, 2.95 A), Jp=-1 (Cu2-Cu2, 5.94 A),
# Ja=-J/0.66-Jab=2.280 (Cu2-Cu2, 5.10 A), Jab=0.75 (Cu1-Cu1, 5.90 A),
# Jip=0.01 (interlayer, the Ja pair shifted by c). All symmetry-equivalent
# bonds were generated by applying the 8 C2/m operations and are listed
# explicitly. (Bond identities were fixed by MATCHING the classical spiral
# minimum to the tutorial: this assignment reproduces k_x = 0.7873 vs the
# reference 0.785902 and E/site = -0.78433 vs -0.78338.)
#
# The ground state is the generalized incommensurate helix with
# k = [0.785902, 0, 0.107049]; the 6 intra-cell spin angles (local_directions)
# were obtained by minimizing the classical energy at that k. pyMagCalc's
# rotating-frame spiral mode then gives the spin-wave spectrum.
# =====================================================================
# on_imaginary: warn -- the spiral uses the TUTORIAL's k = [0.785902, 0, 0.107049],
# but this model's own classical minimum is at k_x = 0.7873 (E/site -0.7838 vs
# -0.78338; see the status table). Imposing the reference k therefore expands LSWT
# about a state that is not quite the minimum, and the acoustic branch acquires a
# small imaginary part (~0.09 meV, 1.8% of the bandwidth). Faithful to the
# tutorial, not a bug. Use minimization with `optimize_k: true` to relax k instead.
parameter_order: [J, Jp, Ja, Jab, Jip]
parameters:
  J: -2.0
  Jp: -1.0
  Ja: 2.280303
  Jab: 0.75
  Jip: 0.01
