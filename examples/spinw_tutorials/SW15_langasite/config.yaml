# =====================================================================
# SW15 - Ba3NbFe3Si2O14 (langasite): incommensurate spiral
#
# Port of SpinW Tutorial 15 / Sunny "SW15" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/15tutorial
#
#   magcalc run examples/spinw_tutorials/SW15_langasite/config.yaml
#
# Trigonal P321 (SG 150), 3 Fe3+ (S=5/2) on Wyckoff 3f. Exchanges J1..J5
# from Marty (2008) / Loire (2011); the chirality is epsilon_T = -1 (as in
# the tutorial), which selects the J3/J5 assignment below. Every
# symmetry-equivalent bond is generated by applying the 6 P321 operations
# to the reference bonds, then listed explicitly (both directions).
#
# The ground state is an incommensurate spiral: 120-degree Fe triangles in
# the ab plane that rotate along c with pitch k = [0,0,0.14275] (~1/7).
# pyMagCalc's rotating-frame spiral mode is used (local_directions hold the
# -1-chirality 120-degree triangle; the c-axis pitch enters as k). The
# k value was found by minimizing the classical energy over kz: with the
# -1 chirality the minimum is at kz = 0.14275 (matching the tutorial's
# 0.1426), while the +1 chirality would give kz = 0 -- reproducing Sunny's
# chirality selection.
# =====================================================================
parameter_order: [J1, J2, J3, J4, J5]
parameters: {J1: 0.85, J2: 0.24, J3: 0.053, J4: 0.017, J5: 0.24}
crystal_structure:
