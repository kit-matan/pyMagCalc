  - [8.539, 0.0, 0.0]
  - [-4.2695, 7.394990922915321, 0.0]
  - [0.0, 0.0, 5.2414]
  atoms_uc:
  - label: Fe1
    pos: [0.24964, 0.0, 0.5]
    spin_S: 2.5
    ion: Fe3+
  - label: Fe2
    pos: [0.0, 0.24964, 0.5]
    spin_S: 2.5
    ion: Fe3+
  - label: Fe3
    pos: [0.75036, 0.75036, 0.5]
    spin_S: 2.5
    ion: Fe3+
