# =====================================================================
# SW05 - Simple kagome ferromagnet
#
# Port of SpinW Tutorial 5 / Sunny "SW05" to pyMagCalc (LSWT).
#   https://spinw.org/tutorials/05tutorial
#
#   magcalc run examples/spinw_tutorials/SW05_kagome_FM/config.yaml
#
# Kagome lattice (hexagonal a=b=6, c=5, gamma=120), three sites per cell.
# Nearest-neighbour ferromagnetic exchange J = -1 meV, S=1. The ground
# state is k=0 ferromagnetic (spin direction arbitrary; along z here).
# Three magnon bands including the characteristic kagome flat band.
#
# The three kagome sites are the SG-147 images of [1/2,0,0]; they are
# listed explicitly here and the NN bond (length 3 A) is generated by the
# distance rule.
# =====================================================================

parameter_order: [J]
parameters:
  J: -1.0

crystal_structure:
  lattice_vectors:
    - [6.0, 0.0, 0.0]
    - [-3.0, 5.196152, 0.0]   # 6 at 120 deg -> (-3, 3*sqrt(3), 0)
    - [0.0, 0.0, 5.0]
  atoms_uc:
    - { label: K1, pos: [0.5, 0.0, 0.0], spin_S: 1.0, ion: Cu2+ }
    - { label: K2, pos: [0.0, 0.5, 0.0], spin_S: 1.0, ion: Cu2+ }
    - { label: K3, pos: [0.5, 0.5, 0.0], spin_S: 1.0, ion: Cu2+ }

interactions:
  symmetry_rules:
    - { type: heisenberg, distance: 3.0, value: "J" }   # kagome NN = a/2

magnetic_structure:
  enabled: true
  type: pattern
  pattern_type: ferromagnetic
  direction: [0.0, 0.0, 1.0]

tasks:
  minimization: false
  dispersion: true

q_path:
  mM:    [-0.5, 0.0, 0.0]
  Gamma: [0.0, 0.0, 0.0]
  K:     [0.5, 0.5, 0.0]
  path: ["mM", "Gamma", "K"]
  points_per_segment: 200

plotting:
  save_plot: true
  show_plot: false
  plot_structure: false
  disp_plot_filename: SW05_disp.png
  disp_title: "SW05 Kagome ferromagnet: dispersion"

calculation:
  cache_mode: "none"

output:
  save_data: false
