tasks:
  minimization: false      # ground state supplied by magnetic_structure
  dispersion: true
  sqw_map: true

q_path:
  Gamma: [0.0, 0.0, 0.0]
  X:     [0.5, 0.0, 0.0]
  M:     [0.5, 0.5, 0.0]
  Y:     [0.0, 0.5, 0.0]
  path: ["Gamma", "X", "M", "Y", "Gamma"]
  points_per_segment: 100

plotting:
  save_plot: true
  show_plot: false
  plot_structure: true
  disp_plot_filename: CCSF_disp.png
  sqw_plot_filename: CCSF_sqw.png
  energy_limits_disp: [0, 16]
  energy_limits_sqw: [0, 16]
  broadening: 0.4
  broadening_width: 0.4
  energy_resolution: 0.04
  disp_title: "Cs2Cu3SnF12 P2_1/n neg-chirality LSWT dispersion"
  sqw_title: "Cs2Cu3SnF12 S(Q,w)"

calculation:
  cache_mode: "none"

output:
  save_data: false
