# =====================================================================
# Cs2Cu3SnF12 -- distorted spin-1/2 kagome antiferromagnet
# Linear spin-wave theory (dispersion + S(Q,w)) with pyMagCalc.
#
#   magcalc run examples/CCSF/config_ccsf.yaml
#
# CORRECT magnetic structure: monoclinic P2_1/n, coplanar 120-degree,
# *negative* vector chirality. Six Cu sublattices in the orthorhombic
# kagome-frame cell; three inequivalent nearest-neighbour exchanges
# J11, J12, J13; DM vectors are J_ij*(0, Dy, -Dz) + symmetry partners
# (entered below as absolute vectors, i.e. already multiplied by J_ij).
# Parameters: variant-B refit of the AMATERAS INS data (see README.md).
# The 120-degree ground state is supplied via magnetic_structure, so the
# web app (pyMagCalc Studio) renders it on import and no minimization is
# needed at run time. This file was generated by convert_to_declarative.py
# from the legacy spin_model.py and is numerically equivalent to it.
# =====================================================================

parameter_order: [J11, J12, J13, J2, Dy, Dz]
parameters:
  J11: 6.89141591
  J12: 8.1417295
  J13: 11.94012088
  J2: 0.21420878
  Dy: 0.15
  Dz: -0.26218775

crystal_structure:
  lattice_vectors:
    - [7.08465000, 0.00000000, 0.00000000]
    - [0.00000000, 12.30704054, 0.00000000]
    - [0.00000000, 0.00000000, 20.13474844]
  atoms_uc:
    - { label: Cu2_1, pos: [0.77059000, 0.24617576, -0.00375329], spin_S: 0.5, ion: Cu2+ }
    - { label: Cu2_2, pos: [0.27059000, 0.25382424, 0.00375337], spin_S: 0.5, ion: Cu2+ }
    - { label: Cu1_1, pos: [0.00000000, 0.50000000, 0.00000000], spin_S: 0.5, ion: Cu2+ }
    - { label: Cu2_3, pos: [0.22941000, 0.75382424, 0.00375346], spin_S: 0.5, ion: Cu2+ }
    - { label: Cu2_4, pos: [0.72941000, 0.74617576, -0.00375321], spin_S: 0.5, ion: Cu2+ }
    - { label: Cu1_2, pos: [0.50000000, 1.00000000, 0.00000000], spin_S: 0.5, ion: Cu2+ }

magnetic_structure:
  enabled: true
  type: pattern
  pattern_type: generic   # one direction per spin: the minimized
                          # negative-chirality 120-degree ground state
  directions:
    - [-0.50862240, -0.86098735, -0.00201036]
    - [-0.50688051, +0.86201395, +0.00202496]
    - [+0.96165373, -0.26881964, +0.05438846]
    - [-0.50862720, -0.86098452, -0.00200471]
    - [-0.50687733, +0.86201583, +0.00201919]
    - [+0.96219645, +0.26686725, -0.05440464]

interactions:
  # Directed entries (both orderings of every bond), extracted 1:1 from
  # the legacy spin model. rij_offset is the neighbour's cell offset.
  - { type: heisenberg, pair: [Cu2_1, Cu2_2], rij_offset: [0, 0, 0], value: "J12" }
  - { type: heisenberg, pair: [Cu2_1, Cu1_1], rij_offset: [0, 0, 0], value: "J2" }
