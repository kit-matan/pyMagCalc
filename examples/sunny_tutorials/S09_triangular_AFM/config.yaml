# =====================================================================
# S09 - Triangular-lattice Heisenberg antiferromagnet (clean part)
#
# Port of the LSWT part of Sunny tutorial 09_Disorder_KPM.jl.
#
#   magcalc run examples/sunny_tutorials/S09_triangular_AFM/config.yaml
#
# One s=1/2 site per cell on a triangular lattice (gamma = 120 deg),
# nearest-neighbour AFM J = 1. The classical ground state is the coplanar
# 120-degree order with propagation vector k = [1/3, 1/3, 0] (the K point);
# spins rotate in the xy plane. This is handled exactly with the rotating-
# frame single_k method (no supercell, no band folding).
#
# The spectrum has the characteristic gapless Goldstone modes at the K-point
# ordering wavevector [1/3,1/3,0]. This is the clean (ordered) limit; the
# tutorial's main subject -- disorder broadening via SpinWaveTheoryKPM -- is
# NOT implemented in pyMagCalc (see this folder's README).
#
# Model note: Sunny sets g = 1 here; g affects only intensity/Zeeman, not the
# dispersion, and there is no field, so it is immaterial to the ported bands.
# =====================================================================

parameter_order: [J]
parameters:
  J: 1.0

crystal_structure:
  lattice_parameters: {a: 3.0, b: 3.0, c: 10.0, alpha: 90.0, beta: 90.0, gamma: 120.0}
  atoms_uc:
  - {label: A, pos: [0.0, 0.0, 0.0], spin_S: 0.5, ion: Cu2+}

interactions:
  symmetry_rules:
  - {type: heisenberg, distance: 3.0, value: J}   # NN triangular bond (|a1|)

magnetic_structure:
  enabled: true
  type: single_k
  k: [0.3333333333333333, 0.3333333333333333, 0.0]   # 120-degree order at K
  axis: [0.0, 0.0, 1.0]                               # spins rotate in the xy plane
  local_directions:
  - [1.0, 0.0, 0.0]
  satellites: true

tasks: {minimization: false, dispersion: true}

q_path:
  Gamma: [0.0, 0.0, 0.0]
  K:     [0.3333333333333333, 0.3333333333333333, 0.0]
  M:     [0.5, 0.0, 0.0]
  Gamma2: [0.0, 0.0, 0.0]
  path: [Gamma, K, M, Gamma2]
  points_per_segment: 120

plotting:
  save_plot: true
  show_plot: false
  plot_structure: false
  disp_plot_filename: S09_disp.png
  disp_title: "Triangular AFM: 120-degree order, LSWT dispersion"

calculation: {cache_mode: none}
output: {save_data: false}
