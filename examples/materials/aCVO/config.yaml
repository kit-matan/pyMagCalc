# =====================================================================
# alpha-Cu2V2O7 (aCVO) LSWT -- LEGACY python-model workflow.
#
# This drives spin_model.py (the hand-written aCVO Hamiltonian: J1/J2/J3
# Heisenberg + G1 anisotropic exchange + a DM vector) through the runner's
# `python_model_file` path. It is the counterpart to the fully declarative
# config_acvo.yaml in this directory -- same material, different route:
#   * config_acvo.yaml -> declarative crystal_structure + symmetry_rules;
#   * config.yaml (this file) -> the legacy spin_model.py module.
#
# WHY THIS FILE WAS BROKEN (and is now fixed): it used to be a nested
# fragment with every key one level down under a `cvo_model:` wrapper, using
# ratio parameters (J2_ratio/J3_ratio) that spin_model.py does not read, and
# no q_path. The runner saw an empty top level and crashed with a bare
# KeyError('crystal_structure'). It is now a valid TOP-LEVEL legacy config;
# the runner also now (a) reports a clear error for such malformed configs
# and (b) no longer mistakes an imported scipy `minimize` for a custom one.
#
# Field along c (H // c). parameter_order matches spin_model.spin_interactions:
# [J1, J2, J3, G1, Dx, Dy, D3, H_dir, H_mag].
# =====================================================================
python_model_file: spin_model.py

parameter_order: [J1, J2, J3, G1, Dx, Dy, D3, H_dir, H_mag]
parameters:
  S: 0.5
  J1: 2.67
  J2: 2.99          # absolute (was J2_ratio * J1 in the old fragment)
  J3: 5.42          # absolute (was J3_ratio * J1)
  G1: 0.282
  Dx: 2.79          # DM component along a
  Dy: 0.0
  D3: 0.0
  H_dir: [0.0, 0.0, 1.0]   # H // c
  H_mag: 20.0

tasks:
  minimization: true
  dispersion: true
  sqw_map: false

minimization:
  enabled: true
  method: anneal            # Monte-Carlo annealing (robust for the canted AFM)
  num_starts: 8
  seed: 0

q_path:
  Gamma: [1.0, 0.0, 0.0]
  M:     [3.0, 0.0, 0.0]
  path: [Gamma, M]
  points_per_segment: 60

plotting:
  save_plot: true
  show_plot: false
  plot_structure: false
  energy_limits_disp: [0, 10]
  disp_plot_filename: aCVO_Hc_disp.png
  disp_title: "alpha-Cu2V2O7 (H // c): dispersion (legacy spin_model.py)"

output:
  save_data: false

calculation:
  cache_mode: none
